services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Embedded Chroma is SQLite-backed, which locks the file to one process -- fine for a
      # single `api` replica today. If this ever needs multiple replicas, migrate to Chroma's
      # server mode (a dedicated `chroma` service here, with vector_store.py switched from a
      # local persist_directory to chromadb.HttpClient) instead of sharing this volume.
      - chroma_data:/app/chroma_db
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  chroma_data:
  redis_data:
